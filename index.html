<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Wordly Dictionary</h1>
        <p>Search any word to get its definition</p>

        <div class="search-box">
            <input type="text" id="word-input" placeholder="Enter a word...">
            <button id="search-btn">Search</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <p>Loading...</p>
        </div>

        <div id="error-Msg" class="results" style="display: none;">
            <p>Word not found. Check your spelling and try again.</p>
        </div>

        <div id="results" class="results" style="display: none;">
            <h2 id="wordDisplay"></h2>
            <p id="pronunciation"></p>

            <div id="definitions"></div>
            <div id="synonyms"></div>

            <button id="favoriteBtn" class="favorite-btn">
                Add to Favorites
            </button>
        </div>

        <div class="favourites">
            <h3>My favorite words</h3>
            <div id="favoritesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
