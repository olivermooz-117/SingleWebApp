<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="container" >
    <h1>Wordly Dictionary</h1>
    <p>Search any word to get its definition</p>


    <div class="search-box" >
    
        <input type="text" id="wordinput" placeholder="Enter a word...">
    <button id="searchBtn" >Search</button>

    </div>


    <div id="loading" class="loading" style="display: none;">
  <p>Loading</p>

    </div>
  
    
    <div id="errorMsg" class="results" style="display: none;" >
       <p>Word not found check your spellings and try </p>
       </div>

       <div id="results" class="results" style="display: none;">

        <h2 id="wordDisplay"></h2>

        <p id="pronuncation"></p>

        <div id="definitions"></div>

        <div id="synonyms"></div>

        <button id="favouriteBtn" class="favourite-btn">Save to Favourites</button>
    </div>

    <div class="favourites">
        <h3>My favourite words</h3>
        <div id="favouritesList"></div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
